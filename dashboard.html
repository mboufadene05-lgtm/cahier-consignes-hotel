<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Cahier de consignes</title>

<style>

body{
font-family: Arial;
background:#f3f6fb;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:30px;
}

textarea{
width:100%;
height:150px;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
margin-top:15px;
padding:10px 25px;
border:none;
border-radius:8px;
background:#2e6cf6;
color:white;
font-size:16px;
cursor:pointer;
}

.note{
background:#f1f4ff;
padding:15px;
border-radius:8px;
margin-top:10px;
}

.date{
font-size:12px;
color:gray;
}

</style>

</head>

<body>

<div class="container">

<h1>📒 Cahier de consignes</h1>
  <p id="user"></p>

<textarea id="message" placeholder="Écrire une consigne..."></textarea>

<br>

<button onclick="addNote()">Ajouter la consigne</button>

<div id="notes"></div>

</div>

<script>

let notes = JSON.parse(localStorage.getItem("consignes")) || [];
  const userEmail = localStorage.getItem("userEmail");

if(userEmail){
document.getElementById("user").innerText = "Connecté : " + userEmail;
}

const notesContainer = document.getElementById("notes");

function displayNotes(){

notesContainer.innerHTML="";

notes.forEach(note =>{

const div=document.createElement("div");

div.className="note";

div.innerHTML=
"<div>"+note.text+"</div>"+
"<div class='date'>"+note.date+"</div>";

notesContainer.appendChild(div);

});

}

function addNote(){

const message=document.getElementById("message").value;

if(message===""){
alert("Écris une consigne");
return;
}

const date=new Date().toLocaleString();

const note={
text:message,
date:date
};

notes.unshift(note);

localStorage.setItem("consignes",JSON.stringify(notes));

document.getElementById("message").value="";

displayNotes();

}

displayNotes();

</script>

</body>
</html>
