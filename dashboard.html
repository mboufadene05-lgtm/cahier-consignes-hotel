<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Cahier de consignes - Glam's Hotel</title>

<link rel="stylesheet" href="style.css">

<style>

body{
font-family: Arial;
background:#f3f6fb;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:30px;
}

textarea{
width:100%;
height:150px;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
margin-top:10px;
padding:10px 20px;
border:none;
border-radius:8px;
background:#2e6cf6;
color:white;
font-size:16px;
cursor:pointer;
}

.note{
background:#f1f4ff;
padding:15px;
border-radius:8px;
margin-top:10px;
}

.date{
font-size:12px;
color:gray;
}

</style>

</head>

<body>

<div class="container">

<h1>📒 Cahier de consignes</h1>

<textarea id="message" placeholder="Écrire une consigne..."></textarea>

<br>

<button onclick="addNote()">Ajouter la consigne</button>

<div id="notes"></div>

</div>

<script>

function addNote(){

const message=document.getElementById("message").value;

if(message===""){
alert("Écris une consigne");
return;
}

const notes=document.getElementById("notes");

const div=document.createElement("div");

const date=new Date().toLocaleString();

div.className="note";

div.innerHTML=
"<div>"+message+"</div>"+
"<div class='date'>"+date+"</div>";

notes.prepend(div);

document.getElementById("message").value="";

}

</script>

</body>
</html>
