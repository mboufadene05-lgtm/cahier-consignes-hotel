<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<title>Cahier de consignes</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:40px;
}

.container{
max-width:1100px;
margin:auto;
background:#1e293b;
padding:30px;
border-radius:12px;
}

h1{
text-align:center;
}

textarea{
width:100%;
height:120px;
padding:10px;
border-radius:8px;
background:#0f172a;
color:white;
border:1px solid #ccc;
}

select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
background:#0f172a;
color:white;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
cursor:pointer;
margin-top:10px;
}

.note{
background:#334155;
padding:15px;
border-radius:8px;
margin-top:10px;
}

.delete{
background:#dc2626;
}

.edit{
background:#f59e0b;
margin-left:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>📒 Cahier de consignes</h1>

<p id="user"></p>

<h3>Réceptionniste</h3>

<select id="receptionist">
<option>Aya</option>
<option>Myriam</option>
<option>Ambre</option>
<option>Amine</option>
<option>Omar</option>
  <option>Extra</option>
</select>

<h3>Consigne</h3>

<textarea id="message"></textarea>

<button onclick="addNote()">Ajouter</button>

<h2>Consignes</h2>

<div id="notes"></div>

</div>

<script>

const userEmail = localStorage.getItem("userEmail");

if(userEmail){
document.getElementById("user").innerText="Connecté : "+userEmail;
}

let notes = JSON.parse(localStorage.getItem("consignesHotel")) || [];

function save(){
localStorage.setItem("consignesHotel",JSON.stringify(notes));
}

function render(){

const notesDiv=document.getElementById("notes");

notesDiv.innerHTML="";

notes.forEach(note=>{

const div=document.createElement("div");

div.className="note";

div.innerHTML=`
<b>${note.user}</b> - ${note.date}<br>
${note.text}

<br>

<button class="delete" onclick="deleteNote(${note.id})">Supprimer</button>

<button class="edit" onclick="editNote(${note.id})">Modifier</button>
`;

notesDiv.appendChild(div);

});

}

function addNote(){

const message=document.getElementById("message").value;

const receptionist=document.getElementById("receptionist").value;

if(message===""){
alert("Écris une consigne");
return;
}

const note={
id:Date.now(),
text:message,
user:receptionist,
date:new Date().toLocaleString("fr-FR")
};

notes.unshift(note);

save();

document.getElementById("message").value="";

render();

}

function deleteNote(id){

notes=notes.filter(n=>n.id!==id);

save();

render();

}

function editNote(id){

const note=notes.find(n=>n.id===id);

const newText=prompt("Modifier la consigne :",note.text);

if(newText!==null){

note.text=newText;

save();

render();

}

}

render();

</script>

</body>
</html>
